<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Venda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="logo-acai">
    <a href="pagina_apresentacao.html">
        <img src="anna'sAcai.jpg" alt="Logo Anna's Açaí">
    </a>
</div>

    <div class="container">
    <h1>🛒 Registrar Venda</h1>

    <h2>Nova Venda</h2>

    <h3>Produto</h3>
    <select>
        <option>Açaí Tradicional</option>
        <option>Açaí com Leite Condensado</option>
        <option>Açaí com Morango</option>
        <option>Açaí com Banana</option>
    </select>

    <h3>Quantidade</h3>
    <input type="number" step="0,1" value="1" min="1">

    <h3>Preço Unitário</h3>
    <input type="number" step="0,01" value="0,00" value="0,00" min="0" >

    <p class="total-venda">
    Total: R$ 0,00
    </p>

<button>Registrar Venda</button>

    <h4>Vendas Registradas</h4>

    <textarea name="" id="" cols="50" rows="5"></textarea>

    <div class="botoes">

        <a href="cadastrar_prod.html">
        <button> Ir para Cadastrar Produto</button>
        </a>

        <a href="produtos_cadastrados.html">
        <button> Ir para Produtos Cadastrados</button>
        </a>

        <a href="relatorios_vendas.html">
        <button> Ir para Relatórios de Vendas</button>
        </a>

    </div>

    <footer>
        Anna's Açaí © 2026
    </footer>
</body>
</html>
