<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
    <h1>📦 Cadastrar Produto</h1>

    <label>Nome do Produto</label>
    <input type="text" placeholder="Ex: Açaí Tradicional">
    
    <label>Categoria</label>
    <select>
        <option>Frutas</option>
        <option>Caldas</option>
        <option>Cremes</option>
        <option>Acompanhamentos</option>
    </select>

    <label>Unidade</label>
    <select>

        <option>Kg</option>
        <option>Litros</option>
        <option>Unidade</option>
    </select>

    <label>Quantidade</label>
    <input type="number" step="0.01" placeholder="Digite a quantidade disponível">  

    <label>Preço</label>
    <input type="number" step="0.01" placeholder="Digite o preço do produto">
    
    <div class="acoes">
        <button>Cadastrar</button>
        <button>Cancelar</button>
        
    </div>

    <div class="botoes">

        <a href="produtos_cadastrados.html">
        <button> Ir para Produtos Cadastrados</button>
        </a>

        <a href="registrarVenda.html">
        <button> Ir para Registrar Venda</button>
        </a>

        <a href="relatoriosDeVendas.html">
        <button> Ir para Relatórios de Vendas</button>
        </a>

    </div>

</body>
</html>
